name: Python Tests

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install mutagen
          pip install librosa
          pip install numpy

      - name: Run Tests
        run: |
          pytest